name: mini_foot_owner_flutter
description: "MiniFoot Owner — App de gestion pour propriétaires de terrains"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  lottie: ^3.1.0
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  dotted_border: ^2.1.0
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  smooth_page_indicator: ^1.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  http: ^1.2.2
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/
    - .env

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Variable.ttf
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Variable.ttf
